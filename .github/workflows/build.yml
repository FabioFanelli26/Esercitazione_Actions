name: Build Website

on:
  push:
    branches:
      - DEV
      - UAT
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p build
          cp index.html build/

      - uses: actions/upload-artifact@v4
        with:
          name: website
          path: build
